name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC (well within the 7-day inactivity window)
    - cron: "0 8 */3 * *"
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep-alive endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}/api/keep-alive")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Keep-alive ping failed with status $STATUS"
            exit 1
          fi
