name: Keep Supabase Alive

on:
  schedule:
    # Runs every 2 days at 08:00 UTC — safely within Supabase's 7-day inactivity window
    - cron: "0 8 */2 * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Ping Supabase via direct DB query
        # Direct PostgreSQL connection counts as activity for Supabase
        run: psql "${{ secrets.DATABASE_URL }}" -c "SELECT 'keep-alive' AS status, now() AS pinged_at;"

      - name: Ping Supabase REST API
        # REST API call is also tracked as activity by Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://lpvajnhlbxisqbvkaads.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "REST API response: $STATUS"
