name: Keep Supabase Alive

on:
  schedule:
    # Runs every 2 days at 08:00 UTC — safely within Supabase's 7-day inactivity window
    - cron: "0 8 */2 * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        # REST API call is tracked as activity by Supabase and avoids DB connection pool limits
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://lpvajnhlbxisqbvkaads.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "REST API response: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "Could not reach Supabase REST API"
            exit 1
          fi
          echo "Supabase is alive!"
